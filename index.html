<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>日報の二度手間をなくす</title>
<style>
body{font-family:sans-serif;margin:0;background:#f5f5f5}
.container{max-width:900px;margin:auto;padding:20px}
h1{font-size:32px;line-height:1.4}
.box{background:white;padding:20px;margin:20px 0;border-radius:10px}
.btn{display:block;text-align:center;background:black;color:white;padding:18px;margin-top:20px;text-decoration:none;border-radius:8px;font-size:18px}
</style>

<body>
<div class="container">

<h1>
日報、まだ手書き→Excel入力してませんか？
</h1>

<div class="box">
<p>
小規模の現場でも
</p>
<p>
1日15分 × 人数分の時間がかかっています
</p>
<p>
5人の現場だと
月4〜5万円分の人件費が消えています
</p>
</div>

<div class="box">
<p>
現場で書く → 事務所でExcel入力
</p>
<p>
同じ内容を2回やっています
</p>
</div>

<div class="box">
<p>
この日報を
スマホ入力に変えるだけで
</p>
<p>
・入力時間短縮<br>
・集計作業ゼロ<br>
・転記ミスなし
</p>
</div>

<div class="box">
<p>
今のExcelはそのままでOKです
</p>
<p>
いきなり変える必要はありません
</p>
<p>
まずは併用から始められます
</p>
</div>

<a class="btn" href="https://kame-web-bi.github.io/nippo-app-/app.html">
無料デモを見る
</a>

</div>
