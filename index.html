<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>日報アプリ</title>
  <style>
    body { font-family: sans-serif; padding: 15px; }
    input, textarea, button {
      width: 100%; margin-bottom: 10px; padding: 12px;
      font-size: 16px;
    }
    button {
      background: #007bff;
      color: white;
      border: none;
      font-weight: bold;
    }
  </style>
</head>
<body>

<h2>日報入力</h2>

<form id="reportForm">
  <input type="date" id="date" required>
  <input type="text" id="name" placeholder="名前" required>
  <input type="text" id="site" placeholder="現場名" required>
  <textarea id="work" placeholder="仕事内容" required></textarea>
  <input type="text" id="machine" placeholder="重機">
  <input type="number" id="time" placeholder="時間（例：2.5）" step="0.5">
  <button type="submit">送信</button>
</form>

<script>
document.getElementById("reportForm").addEventListener("submit", function(e) {
  e.preventDefault();

  const data = {
    date: document.getElementById("date").value,
    name: document.getElementById("name").value,
    site: document.getElementById("site").value,
    work: document.getElementById("work").value,
    machine: document.getElementById("machine").value,
    time: document.getElementById("time").value
  };

  fetch("https://script.google.com/macros/s/AKfycbxMSUKH37gUrIwyOTIwdiZjyw1zKUPxu4NqmxAnUcSV9jHMidF1wJ90B01fqZZcaNwD/exec", {
    method: "POST",
    mode: "no-cors",
    body: JSON.stringify(data)
  });

  alert("送信完了！");
  this.reset();
});
</script>

</body>
</html>
