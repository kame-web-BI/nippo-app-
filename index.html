<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>かんたん日報</title>

<style>
body {
  font-family: sans-serif;
  padding: 15px;
  font-size: 22px;
}

input, textarea, button {
  width: 100%;
  margin-bottom: 15px;
  padding: 15px;
  font-size: 22px;
}

button {
  background: #007bff;
  color: white;
  border: none;
  height: 70px;
  font-size: 24px;
}
</style>
</head>

<body>

<h2>かんたん日報</h2>

<form id="reportForm">

<label>日付</label>
<input type="date" id="date" readonly>

<label>名前</label>
<input type="text" id="name" readonly>

<label>現場名</label>
<input type="text" id="site" placeholder="例：〇〇工事">

<label>作業内容</label>
<textarea id="work" placeholder="例：掘削・整地"></textarea>

<label>作業時間（時間）</label>
<input type="number" id="time" step="0.5" placeholder="例：2">

<button type="submit">送信</button>

</form>

<script>
// 日付自動
const today = new Date().toISOString().split('T')[0];
document.getElementById("date").value = today;

// 名前自動
let savedName = localStorage.getItem("workerName");

if (!savedName) {
  savedName = prompt("最初に名前を入力してください");
  localStorage.setItem("workerName", savedName);
}

document.getElementById("name").value = savedName;

// 送信処理
document.getElementById("reportForm").addEventListener("submit", function(e) {
  e.preventDefault();

  const data = {
    date: document.getElementById("date").value,
    name: document.getElementById("name").value,
    site: document.getElementById("site").value,
    work: document.getElementById("work").value,
    time: document.getElementById("time").value
  };

  fetch("https://script.google.com/macros/s/AKfycbxMSUKH37gUrIwyOTIwdiZjyw1zKUPxu4NqmxAnUcSV9jHMidF1wJ90B01fqZZcaNwD/exec", {
    method: "POST",
    mode: "no-cors",
    body: JSON.stringify(data)
  });

  alert("送信できました！");
  this.reset();

  // 日付と名前は再セット
  document.getElementById("date").value = today;
  document.getElementById("name").value = savedName;
});
</script>

</body>
</html>
