<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>日報アプリ</title>
  <style>
    body { font-family: sans-serif; padding: 15px; }
    input, textarea, button {
      width: 100%; margin-bottom: 10px; padding: 10px;
      font-size: 16px;
    }
    button { background: #007bff; color: white; border: none; }
  </style>
</head>
<body>

<h2>日報入力</h2>

<form id="reportForm">
  <label>日付</label>
  <input type="date" id="date" required>

  <label>名前</label>
  <input type="text" id="name" required>

  <label>現場名</label>
  <input type="text" id="site" required>

  <label>仕事内容</label>
  <textarea id="work" required></textarea>

  <label>使用した重機</label>
  <input type="text" id="machine">

  <label>使用時間（時間）</label>
  <input type="number" id="time" step="0.5">

  <button type="submit">送信</button>
</form>

<script>
const form = document.getElementById('reportForm');

form.addEventListener('submit', function(e) {
  e.preventDefault();

  const data = {
    date: document.getElementById('date').value,
    name: document.getElementById('name').value,
    site: document.getElementById('site').value,
    work: document.getElementById('work').value,
    machine: document.getElementById('machine').value,
    time: document.getElementById('time').value
  };

  fetch("https://script.google.com/macros/s/AKfycbxMSUKH37gUrIwyOTIwdiZjyw1zKUPxu4NqmxAnUcSV9jHMidF1wJ90B01fqZZcaNwD/exec", {
    method: "POST",
    mode: "no-cors",
    body: JSON.stringify(data),
    headers: {
      "Content-Type": "application/json"
    }
  });

  alert("送信しました！");
  form.reset();
});
</script>

</body>
</html>
