<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>かんたん日報</title>

<style>
body {
  font-family: sans-serif;
  padding: 15px;
  font-size: 22px;
  max-width: 700px;
  margin: auto;
}

input, textarea, button {
  width: 100%;
  margin-bottom: 15px;
  padding: 15px;
  font-size: 22px;
  box-sizing: border-box;
}

button {
  background: #007bff;
  color: white;
  border: none;
  height: 70px;
  font-size: 24px;
  border-radius: 8px;
}

h3 {
  margin-top: 25px;
  margin-bottom: 10px;
}

.machine-block {
  border: 1px solid #ccc;
  padding: 12px;
  margin-bottom: 15px;
  border-radius: 8px;
  background: #f9f9f9;
}
</style>
</head>

<body>

<h2>かんたん日報</h2>

<form id="reportForm">

<label>日付</label>
<input type="date" id="date" readonly>

<label>名前</label>
<input type="text" id="name" readonly>

<label>現場名</label>
<input type="text" id="site">

<label>作業内容</label>
<textarea id="work"></textarea>

<h3>使用重機</h3>

<div class="machine-block">
  <label>重機1</label>
  <input type="text" id="machine1">

  <label>重機時間1</label>
  <input type="number" id="machineTime1" step="0.5" placeholder="8">
</div>

<div class="machine-block">
  <label>重機2</label>
  <input type="text" id="machine2">

  <label>重機時間2</label>
  <input type="number" id="machineTime2" step="0.5" placeholder="8">
</div>

<div class="machine-block">
  <label>重機3</label>
  <input type="text" id="machine3">

  <label>重機時間3</label>
  <input type="number" id="machineTime3" step="0.5" placeholder="8">
</div>

<label>作業時間（合計）</label>
<input type="number" id="time" step="0.5" placeholder="8">

<button type="submit">送信</button>

</form>

<script>
const today = new Date().toISOString().split('T')[0];
document.getElementById("date").value = today;

let savedName = localStorage.getItem("workerName");
if (!savedName) {
  savedName = prompt("最初に名前を入力してください");
  localStorage.setItem("workerName", savedName);
}
document.getElementById("name").value = savedName;

document.getElementById("reportForm").addEventListener("submit", function(e) {
  e.preventDefault();

  const machines = [];
  const machineTimes = [];

  for (let i = 1; i <= 3; i++) {
    const machine = document.getElementById("machine" + i).value.trim();
    const machineTime = document.getElementById("machineTime" + i).value.trim();

    if (machine) {
      machines.push(machine);
      machineTimes.push(machineTime || "");
    }
  }

  const data = {
    date: document.getElementById("date").value,
    name: document.getElementById("name").value,
    site: document.getElementById("site").value,
    work: document.getElementById("work").value,
    machine: machines.join(" / "),
    machineTime: machineTimes.join(" / "),
    time: document.getElementById("time").value
  };

  fetch("https://script.google.com/macros/s/AKfycbxMSUKH37gUrIwyOTIwdiZjyw1zKUPxu4NqmxAnUcSV9jHMidF1wJ90B01fqZZcaNwD/exec", {
    method: "POST",
    mode: "no-cors",
    body: JSON.stringify(data)
  });

  alert("送信できました！");
  this.reset();

  document.getElementById("date").value = today;
  document.getElementById("name").value = savedName;
});
</script>

</body>
</html>
